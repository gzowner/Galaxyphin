name: Bootstrap Galaxyphin Source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Galaxyphin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check bootstrap state
        id: state
        shell: bash
        run: |
          if [[ -f .galaxyphin-bootstrap-complete ]]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.state.outputs.done != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Import Wholphin source
        if: steps.state.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/bootstrap-galaxyphin.yml /tmp/bootstrap-galaxyphin.yml
          git clone --depth 1 https://github.com/gzowner/Wholphin.git /tmp/Wholphin
          UPSTREAM_SHA="$(git -C /tmp/Wholphin rev-parse HEAD)"
          rm -rf /tmp/Wholphin/.git
          rm -rf /tmp/Wholphin/.github/workflows
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/Wholphin/. .
          mkdir -p .github/workflows
          cp /tmp/bootstrap-galaxyphin.yml .github/workflows/bootstrap-galaxyphin.yml
          printf '%s\n' "$UPSTREAM_SHA" > .galaxyphin-upstream-commit

      - name: Install artwork dependency
        if: steps.state.outputs.done != 'true'
        run: python3 -m pip install --disable-pip-version-check pillow

      - name: Apply Galaxy Media branding
        if: steps.state.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont, ImageFilter
          import math
          import random

          ROOT = Path.cwd()
          RES = ROOT / "app/src/main/res"
          RANDOM = random.Random(24071926)

          def replace_required(relative, old, new):
              path = ROOT / relative
              text = path.read_text(encoding="utf-8")
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f"Expected branding source was not found in {relative}: {old}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_required(
              "app/src/main/AndroidManifest.xml",
              'android:banner="@mipmap/ic_banner"',
              'android:banner="@mipmap/galaxy_media_banner"',
          )
          replace_required(
              "app/src/main/AndroidManifest.xml",
              'android:icon="@mipmap/ic_launcher"',
              'android:icon="@mipmap/galaxy_media_icon"\n        android:roundIcon="@mipmap/galaxy_media_icon_round"',
          )
          replace_required(
              "app/src/main/AndroidManifest.xml",
              'android:theme="@style/Theme.Wholphin"',
              'android:theme="@style/Theme.GalaxyMedia"',
          )
          replace_required(
              "app/src/main/res/values/strings.xml",
              '<string name="app_name" translatable="false">Wholphin</string>',
              '<string name="app_name" translatable="false">Galaxy Media</string>',
          )
          replace_required(
              "app/src/main/res/values/strings.xml",
              '<string name="app_name_long" translatable="false">Wholphin</string>',
              '<string name="app_name_long" translatable="false">Galaxy Media</string>',
          )
          replace_required(
              "settings.gradle.kts",
              'rootProject.name = "Wholphin"',
              'rootProject.name = "GalaxyMedia"',
          )
          replace_required(
              "app/build.gradle.kts",
              'applicationId = "com.github.damontecres.wholphin"',
              'applicationId = "com.galaxymedia.galaxyphin"',
          )
          replace_required(
              "app/build.gradle.kts",
              '"Wholphin-${variant.flavorName}-${variant.buildType}-${output.versionName.get()}-${output.versionCode.get()}$abi.apk"',
              '"GalaxyMedia-${variant.flavorName}-${variant.buildType}-${output.versionName.get()}-${output.versionCode.get()}$abi.apk"',
          )
          replace_required(
              "app/src/main/java/com/github/damontecres/wholphin/services/UpdateChecker.kt",
              'const val ASSET_NAME = "Wholphin"',
              'const val ASSET_NAME = "GalaxyMedia"',
          )

          for path in (ROOT / "app").rglob("*"):
              if not path.is_file() or path.suffix.lower() not in {".kt", ".kts", ".xml", ".proto", ".json"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              updated = text.replace(
                  "https://api.github.com/repos/damontecres/Wholphin",
                  "https://api.github.com/repos/gzowner/Galaxyphin",
              )
              if updated != text:
                  path.write_text(updated, encoding="utf-8")

          themes = '''<resources>

              <style name="Theme.GalaxyMedia" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:colorBackground">@color/galaxy_media_background</item>
                  <item name="android:windowBackground">@color/galaxy_media_background</item>
                  <item name="android:navigationBarColor">@color/galaxy_media_background</item>
                  <item name="android:statusBarColor">@color/galaxy_media_background</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>

              <style name="Theme.Wholphin" parent="Theme.GalaxyMedia" />

          </resources>
          '''
          (RES / "values/themes.xml").write_text(themes, encoding="utf-8")

          brand_colors = '''<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="galaxy_media_background">#090B14</color>
              <color name="galaxy_media_icon_background">#050817</color>
              <color name="galaxy_media_banner_background">#050817</color>
              <color name="galaxy_media_primary">#5B8CFF</color>
              <color name="galaxy_media_accent">#27D3FF</color>
              <color name="galaxy_media_secondary">#7C4DFF</color>
          </resources>
          '''
          (RES / "values/galaxy_media_brand_colors.xml").write_text(brand_colors, encoding="utf-8")

          color_path = ROOT / "app/src/main/java/com/github/damontecres/wholphin/ui/theme/colors/PurpleThemeColors.kt"
          colors = color_path.read_text(encoding="utf-8")
          color_map = {
              "0xFF5F00D6": "0xFF315FD6",
              "0xFF7A28FE": "0xFF5B8CFF",
              "0xFFEADCFF": "0xFFFFFFFF",
              "0xFF6B4BAE": "0xFF4C63B6",
              "0xFFB594FD": "0xFFA9BEFF",
              "0xFF472489": "0xFF10204F",
              "0xFF8F007E": "0xFF007A99",
              "0xFFB800A3": "0xFF27D3FF",
              "0xFFFFD7F0": "0xFF001F29",
              "0xFFFEF7FF": "0xFFF6F8FF",
              "0xFF1D1A25": "0xFF111521",
              "0xFFE9DEF6": "0xFFDDE4F5",
              "0xFF4A4456": "0xFF232833",
              "0xFF332E3A": "0xFF20232B",
              "0xFFF6EDFE": "0xFFF5F7FF",
              "0xFFD2BCFF": "0xFF9DB7FF",
              "0xFF3D008F": "0xFF08245C",
              "0xFF3B167D": "0xFF10204F",
              "0xFF48415B": "0xFF27304A",
              "0xFFDFD3F8": "0xFFDDE5FF",
              "0xFFA071F8": "0xFF27D3FF",
              "0xFF5E0052": "0xFF002B38",
              "0xFF15121C": "0xFF090B14",
              "0xFFE8DFF0": "0xFFF5F7FF",
              "0xFFCCC3D9": "0xFFB8C3E1",
              "0xFF741BF8": "0xFF5B8CFF",
          }
          for old, new in color_map.items():
              colors = colors.replace(old, new)
          color_path.write_text(colors, encoding="utf-8")

          def font(size, bold=True):
              candidates = [
                  "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf" if bold else "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf",
                  "/usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf" if bold else "/usr/share/fonts/truetype/liberation2/LiberationSans-Regular.ttf",
              ]
              for candidate in candidates:
                  if Path(candidate).exists():
                      return ImageFont.truetype(candidate, size=size)
              return ImageFont.load_default()

          def space_background(size):
              w, h = size
              image = Image.new("RGBA", size, (5, 8, 23, 255))
              nebula = Image.new("RGBA", size, (0, 0, 0, 0))
              nd = ImageDraw.Draw(nebula)
              clouds = [
                  (0.12, 0.58, 0.48, (42, 88, 255, 105)),
                  (0.62, 0.28, 0.44, (124, 77, 255, 95)),
                  (0.78, 0.74, 0.36, (39, 211, 255, 75)),
                  (0.43, 0.82, 0.30, (45, 91, 210, 55)),
              ]
              for cx, cy, radius, color in clouds:
                  rx = int(w * radius)
                  ry = int(h * radius * 0.72)
                  x = int(w * cx)
                  y = int(h * cy)
                  nd.ellipse((x-rx, y-ry, x+rx, y+ry), fill=color)
              nebula = nebula.filter(ImageFilter.GaussianBlur(max(12, int(min(w, h) * 0.10))))
              image = Image.alpha_composite(image, nebula)
              stars = ImageDraw.Draw(image)
              count = max(40, int(w * h / 5200))
              for _ in range(count):
                  x = RANDOM.randrange(w)
                  y = RANDOM.randrange(h)
                  r = RANDOM.choice([1, 1, 1, 2, 2, 3]) * max(1, w // 640)
                  alpha = RANDOM.randrange(115, 246)
                  tint = RANDOM.choice([(245,247,255,alpha), (174,208,255,alpha), (124,238,255,alpha)])
                  stars.ellipse((x-r, y-r, x+r, y+r), fill=tint)
              return image

          def emblem(size):
              canvas = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              glow = Image.new("RGBA", canvas.size, (0, 0, 0, 0))
              gd = ImageDraw.Draw(glow)
              margin = int(size * 0.16)
              gd.ellipse((margin, margin, size-margin, size-margin), outline=(39, 211, 255, 155), width=max(5, size//28))
              glow = glow.filter(ImageFilter.GaussianBlur(max(4, size//35)))
              canvas = Image.alpha_composite(canvas, glow)
              d = ImageDraw.Draw(canvas)
              box = (margin, margin, size-margin, size-margin)
              width = max(7, size//25)
              d.arc(box, 205, 350, fill=(91, 140, 255, 255), width=width)
              d.arc(box, 350, 105, fill=(39, 211, 255, 255), width=width)
              d.arc(box, 105, 205, fill=(124, 77, 255, 255), width=width)
              inner = int(size * 0.31)
              d.ellipse((inner, inner, size-inner, size-inner), fill=(8, 13, 35, 230), outline=(245,247,255,90), width=max(2, size//120))
              cx, cy = size//2, size//2
              tri_w = int(size * 0.20)
              tri_h = int(size * 0.24)
              d.polygon([
                  (cx-tri_w//3, cy-tri_h//2),
                  (cx-tri_w//3, cy+tri_h//2),
                  (cx+tri_w*2//3, cy),
              ], fill=(245, 247, 255, 255))
              for angle, radius, dot, color in [
                  (25, .42, .025, (39,211,255,255)),
                  (152, .43, .019, (255,255,255,240)),
                  (284, .41, .022, (124,77,255,255)),
              ]:
                  a = math.radians(angle)
                  x = cx + int(math.cos(a) * size * radius)
                  y = cy + int(math.sin(a) * size * radius)
                  rr = max(2, int(size * dot))
                  d.ellipse((x-rr, y-rr, x+rr, y+rr), fill=color)
              return canvas

          icon_master = space_background((512, 512))
          icon_master.alpha_composite(emblem(430), ((512-430)//2, (512-430)//2))
          vignette = Image.new("RGBA", icon_master.size, (0,0,0,0))
          vd = ImageDraw.Draw(vignette)
          vd.rounded_rectangle((6,6,506,506), radius=92, outline=(91,140,255,105), width=8)
          icon_master = Image.alpha_composite(icon_master, vignette)
          icon_foreground = emblem(432)

          banner_master = space_background((1280, 720))
          banner_foreground = Image.new("RGBA", banner_master.size, (0,0,0,0))
          banner_foreground.alpha_composite(emblem(430), (70, 145))
          bd = ImageDraw.Draw(banner_foreground)
          galaxy_font = font(128, True)
          media_font = font(94, True)
          tagline_font = font(31, False)
          bd.text((535, 205), "GALAXY", font=galaxy_font, fill=(245,247,255,255), stroke_width=2, stroke_fill=(39,80,170,180))
          bd.text((540, 345), "MEDIA", font=media_font, fill=(39,211,255,255), stroke_width=1, stroke_fill=(8,20,50,255))
          bd.rounded_rectangle((542, 458, 1110, 463), radius=2, fill=(91,140,255,190))
          bd.text((542, 485), "YOUR UNIVERSE OF ENTERTAINMENT", font=tagline_font, fill=(190,205,235,235))
          banner_master = Image.alpha_composite(banner_master, banner_foreground)

          playstore = ROOT / "app/src/main/ic_launcher-playstore.png"
          playstore.parent.mkdir(parents=True, exist_ok=True)
          icon_master.convert("RGBA").save(playstore, "PNG", optimize=True)

          densities = {
              "mdpi": (48, 108, (320, 180)),
              "hdpi": (72, 162, (480, 270)),
              "xhdpi": (96, 216, (640, 360)),
              "xxhdpi": (144, 324, (960, 540)),
              "xxxhdpi": (192, 432, (1280, 720)),
          }
          for density, (icon_size, foreground_size, banner_size) in densities.items():
              target = RES / f"mipmap-{density}"
              target.mkdir(parents=True, exist_ok=True)
              icon = icon_master.resize((icon_size, icon_size), Image.Resampling.LANCZOS)
              icon.save(target / "galaxy_media_icon.webp", "WEBP", lossless=True, method=6)
              icon.save(target / "galaxy_media_icon_round.webp", "WEBP", lossless=True, method=6)
              fg = icon_foreground.resize((foreground_size, foreground_size), Image.Resampling.LANCZOS)
              fg.save(target / "galaxy_media_icon_foreground.webp", "WEBP", lossless=True, method=6)
              banner = banner_master.resize(banner_size, Image.Resampling.LANCZOS)
              banner.save(target / "galaxy_media_banner.webp", "WEBP", lossless=True, method=6)
              banner_fg = banner_foreground.resize(banner_size, Image.Resampling.LANCZOS)
              banner_fg.save(target / "galaxy_media_banner_foreground.webp", "WEBP", lossless=True, method=6)

          anydpi = RES / "mipmap-anydpi-v26"
          anydpi.mkdir(parents=True, exist_ok=True)
          (anydpi / "galaxy_media_icon.xml").write_text('''<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/galaxy_media_icon_background"/>
              <foreground android:drawable="@mipmap/galaxy_media_icon_foreground"/>
          </adaptive-icon>
          ''', encoding="utf-8")
          (anydpi / "galaxy_media_icon_round.xml").write_text('''<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/galaxy_media_icon_background"/>
              <foreground android:drawable="@mipmap/galaxy_media_icon_foreground"/>
          </adaptive-icon>
          ''', encoding="utf-8")
          (anydpi / "galaxy_media_banner.xml").write_text('''<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/galaxy_media_banner_background"/>
              <foreground>
                  <inset android:inset="8%" android:drawable="@mipmap/galaxy_media_banner_foreground"/>
              </foreground>
          </adaptive-icon>
          ''', encoding="utf-8")

          docs = ROOT / "docs"
          docs.mkdir(exist_ok=True)
          banner_master.convert("RGB").save(docs / "galaxy-media-banner.jpg", "JPEG", quality=91, optimize=True)
          icon_master.convert("RGBA").save(docs / "galaxy-media-icon.png", "PNG", optimize=True)

          upstream_readme = ROOT / "README.md"
          if upstream_readme.exists():
              upstream_readme.rename(ROOT / "README-UPSTREAM.md")
          readme = '''# Galaxyphin — Galaxy Media

          Galaxyphin is the **Galaxy Media** branded Android TV, Google TV, and Fire TV client built from the open-source Wholphin Jellyfin client.

          ![Galaxy Media banner](docs/galaxy-media-banner.jpg)

          ## Galaxy Media changes

          - Galaxy Media launcher icon and television banner
          - Dark navy, electric blue, cyan, and violet interface palette
          - Application display name changed to `Galaxy Media`
          - Independent Android application ID: `com.galaxymedia.galaxyphin`
          - APK filenames begin with `GalaxyMedia-`
          - Release update checks point to `gzowner/Galaxyphin`
          - Playback engine and underlying Wholphin source structure remain intact

          ## Build

          ```bash
          ./gradlew :app:assembleDefaultDebug
          ```

          The generated debug APK is placed under `app/build/outputs/apk/default/debug/`.

          ## Open-source attribution

          Galaxyphin is based on [Wholphin](https://github.com/damontecres/Wholphin), an open-source Android TV client for Jellyfin. The original project documentation is retained in [README-UPSTREAM.md](README-UPSTREAM.md).

          This repository retains the upstream **GNU General Public License version 2**. Distributions must continue to comply with that license and provide the corresponding source code.
          '''
          ROOT.joinpath("README.md").write_text("\n".join(line.strip() for line in readme.splitlines()) + "\n", encoding="utf-8")
          ROOT.joinpath("GALAXY-MEDIA-BRANDING.md").write_text('''# Galaxy Media brand specification

          - Background: `#090B14`
          - Primary blue: `#5B8CFF`
          - Cyan accent: `#27D3FF`
          - Violet secondary: `#7C4DFF`
          - Primary text: `#F5F7FF`
          - Android application ID: `com.galaxymedia.galaxyphin`
          - Visible application name: `Galaxy Media`
          ''', encoding="utf-8")
          PY

          printf 'Galaxyphin bootstrap complete\n' > .galaxyphin-bootstrap-complete
          git diff --check

      - name: Build debug APK
        if: steps.state.outputs.done != 'true'
        continue-on-error: true
        run: ./gradlew :app:assembleDefaultDebug --no-daemon --stacktrace

      - name: Commit branded source
        if: steps.state.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Galaxy Media Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Import Wholphin and apply Galaxy Media branding"
          git push origin HEAD:main
