name: Build Galaxyphin APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'wholphin-mpv-stub/**'
      - '.github/actions/setup/**'
      - '.github/workflows/build-galaxyphin-apk.yml'
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  build:
    if: github.event_name != 'issues' || github.event.issue.title == 'Build Galaxyphin APK'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Galaxyphin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provide fallback application version tag
        shell: bash
        run: |
          set -euo pipefail
          if ! git describe --tags --match='v*' >/dev/null 2>&1; then
            git tag v0.0.0
          fi

      - name: Set up Android build environment
        uses: ./.github/actions/setup

      - name: Build Galaxy Media debug APKs
        id: gradle
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew

          set +e
          ./gradlew :app:assembleDefaultDebug --stacktrace --no-daemon 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=$BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"
          tail -n 180 build.log > build-tail.txt

          awk '
            /FAILURE: Build failed with an exception\./ { capture=1 }
            capture && /\* Exception is:/ { exit }
            capture { print }
          ' build.log > build-summary.txt

          if [[ ! -s build-summary.txt ]]; then
            grep -n -E -B 4 -A 12 '(^e: |error:|A problem occurred|Could not |Execution failed|Exception)' build.log \
              | head -n 180 > build-summary.txt || true
          fi

          if [[ ! -s build-summary.txt ]]; then
            cp build-tail.txt build-summary.txt
          fi

      - name: Prepare downloadable APKs
        if: steps.gradle.outputs.exit_code == '0'
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_DIR='app/build/outputs/apk/default/debug'
          DIST_DIR='dist'

          mkdir -p "$DIST_DIR"

          mapfile -t APKS < <(find "$OUTPUT_DIR" -maxdepth 1 -type f -name 'GalaxyMedia-*.apk' -print | sort)
          if (( ${#APKS[@]} == 0 )); then
            echo 'No GalaxyMedia APK files were generated.' >&2
            find app/build/outputs -maxdepth 6 -type f -print || true
            exit 1
          fi

          printf 'Generated APKs:\n'
          printf '  %s\n' "${APKS[@]}"
          cp "${APKS[@]}" "$DIST_DIR/"

          UNIVERSAL_APK=''
          for apk in "${APKS[@]}"; do
            case "$apk" in
              *-armeabi-v7a.apk|*-arm64-v8a.apk) ;;
              *) UNIVERSAL_APK="$apk"; break ;;
            esac
          done

          if [[ -z "$UNIVERSAL_APK" ]]; then
            echo 'The universal APK could not be identified.' >&2
            exit 1
          fi

          cp "$UNIVERSAL_APK" "$DIST_DIR/GalaxyMedia-universal-debug.apk"
          (
            cd "$DIST_DIR"
            sha256sum ./*.apk > SHA256SUMS.txt
          )

      - name: Upload Galaxyphin APK artifact
        if: steps.gradle.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: Galaxyphin-debug-apks
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Galaxyphin-build-log-${{ github.run_number }}
          path: |
            build.log
            build-summary.txt
            build-tail.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Report build result
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BUILD_EXIT_CODE: ${{ steps.gradle.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BUILD_EXIT_CODE" == '0' ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "Galaxyphin APK build completed successfully. Download **Galaxyphin-debug-apks** from the workflow run: $RUN_URL"
            gh issue close "$ISSUE_NUMBER" --reason completed
          else
            {
              echo "Galaxyphin APK build failed. Full log artifact: $RUN_URL"
              echo
              echo '<details><summary>Gradle failure summary</summary>'
              echo
              echo '```text'
              cat build-summary.txt 2>/dev/null || echo 'Build output was unavailable.'
              echo '```'
              echo '</details>'
            } > issue-comment.md
            gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          fi

      - name: Mark failed Gradle build
        if: steps.gradle.outputs.exit_code != '0'
        shell: bash
        run: exit 1
