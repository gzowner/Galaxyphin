name: Build Galaxyphin Release APK

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: galaxyphin-release-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  build-release:
    if: github.event_name != 'issues' || github.event.issue.title == 'Build Galaxyphin Release'
    runs-on: ubuntu-latest

    steps:
      - name: Report release build start
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue comment "$ISSUE_NUMBER" --body "Galaxyphin 0.1.1 normal release build has started: $RUN_URL"

      - name: Checkout Galaxyphin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Android build environment
        uses: ./.github/actions/setup

      - name: Build unsigned Galaxy Media release APKs
        id: gradle
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          set +e
          ./gradlew :app:assembleDefaultRelease --stacktrace --no-daemon 2>&1 | tee release-build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"
          tail -n 200 release-build.log > release-build-tail.txt

      - name: Prepare aligned APK and signing tools
        if: steps.gradle.outputs.exit_code == '0'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          OUTPUT_DIR='app/build/outputs/apk/default/release'
          DIST_DIR='dist'
          mkdir -p "$DIST_DIR"

          mapfile -t APKS < <(find "$OUTPUT_DIR" -maxdepth 1 -type f -name '*.apk' -print | sort)
          if (( ${#APKS[@]} == 0 )); then
            echo 'No release APK files were generated.' >&2
            exit 1
          fi

          UNIVERSAL_APK=''
          for apk in "${APKS[@]}"; do
            case "$apk" in
              *-armeabi-v7a*.apk|*-arm64-v8a*.apk) ;;
              *) UNIVERSAL_APK="$apk"; break ;;
            esac
          done
          [[ -n "$UNIVERSAL_APK" ]]

          BUILD_TOOLS="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS_VERSION}"
          TARGET="$DIST_DIR/GalaxyMedia-${VERSION}-universal-release-aligned-unsigned.apk"
          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNIVERSAL_APK" "$TARGET"
          "$BUILD_TOOLS/zipalign" -c -p 4 "$TARGET"

          mkdir -p "$DIST_DIR/apksigner-tools/lib"
          cp "$BUILD_TOOLS/apksigner" "$DIST_DIR/apksigner-tools/"
          cp "$BUILD_TOOLS/lib/apksigner.jar" "$DIST_DIR/apksigner-tools/lib/"
          chmod +x "$DIST_DIR/apksigner-tools/apksigner"
          printf 'Android build-tools version: %s\n' "$BUILD_TOOLS_VERSION" > "$DIST_DIR/apksigner-tools/VERSION.txt"

          sha256sum "$TARGET" > "$DIST_DIR/SHA256SUMS-UNSIGNED.txt"

      - name: Upload unsigned release package
        if: steps.gradle.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: Galaxyphin-unsigned-release-apks
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload release build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Galaxyphin-release-build-log-${{ github.run_number }}
          path: |
            release-build.log
            release-build-tail.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Report release build result
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BUILD_EXIT_CODE: ${{ steps.gradle.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ "$BUILD_EXIT_CODE" == '0' ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "Galaxyphin 0.1.1 unsigned release and apksigner tools are ready: $RUN_URL"
            gh issue close "$ISSUE_NUMBER" --reason completed
          else
            gh issue comment "$ISSUE_NUMBER" --body "Galaxyphin release build failed. Review: $RUN_URL"
          fi

      - name: Mark failed Gradle build
        if: steps.gradle.outputs.exit_code != '0'
        run: exit 1

  export-panel-sources:
    if: github.event_name == 'issues' && github.event.issue.title == 'Export Emby Panel Sources'
    runs-on: ubuntu-latest

    steps:
      - name: Report source export start
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue comment "$ISSUE_NUMBER" --body "Panel source export started: $RUN_URL"

      - name: Download current Emby panel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export
          curl --fail --location --retry 5 \
            https://raw.githubusercontent.com/gzowner/3mbyPanel/main/3mbypanel-v0.1.0.zip \
            --output export/3mbypanel-v0.1.0.zip
          unzip -q export/3mbypanel-v0.1.0.zip -d export/emby-current

      - name: Clone JellyPanel reference source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/gzowner/JellyPanel.git export/JellyPanel
          rm -rf export/JellyPanel/.git

      - name: Package source trees
        shell: bash
        run: |
          set -euo pipefail
          tar -C export -czf panel-sources.tar.gz \
            3mbypanel-v0.1.0.zip emby-current JellyPanel
          sha256sum panel-sources.tar.gz > panel-sources.sha256

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: Emby-and-JellyPanel-sources
          path: |
            panel-sources.tar.gz
            panel-sources.sha256
          retention-days: 1

      - name: Report source export completion
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Panel source export completed. Download **Emby-and-JellyPanel-sources** from: $RUN_URL"
          gh issue close "$ISSUE_NUMBER" --reason completed
